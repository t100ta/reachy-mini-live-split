[livesplit]
transport = "ws"
host = "127.0.0.1"
port = 16834
poll_interval_ms = 200
comparison = "Personal Best"

[thresholds]
ahead_seconds = -1.5
behind_seconds = 1.5
pace_debounce_ms = 1200
motion_cooldown_ms = 2000
impulse_cooldown_ms = 500
split_priority_ms = 1500
ready_duration_ms = 1200
finished_duration_ms = 2500
idle_variation_interval_ms = 45000  # 待機中アイドルモーションの発火間隔（ミリ秒）
expression_sound_volume = 0.35      # Expression 音声の音量（0.0〜1.0）TTS より小さめに

[reachy]
enabled = true
dry_run = false
host = "reachy-mini.local"

[logging]
level = "INFO"
jsonl_path = "logs/session.jsonl"

[web]
enabled = false
host = "0.0.0.0"
port = 8765
audio_path = "logs/audio"

[tts]
enabled = false
engine = "openai"                       # "openai" | "coeiroink"
openai_api_key = "${OPENAI_API_KEY}"
llm_model = "gpt-4o-mini"
tts_model = "tts-1"
tts_voice = "alloy"
coeiroink_url = "http://127.0.0.1:50032"
coeiroink_speaker_name = "茅冬生すずな"
coeiroink_style_name = "のーまる"
igdb_client_id = "${IGDB_CLIENT_ID}"
igdb_client_secret = "${IGDB_CLIENT_SECRET}"
game_cache_path = "logs/game_cache.json"
game_name = ""      # LiveSplit から取得できない場合に手動設定（例: "Skate Story"）
category_name = ""  # 同上（例: "Any%"）
comment_events = ["run_started", "split_good", "split_bad", "run_finished", "run_reset"]
audio_path = "logs/audio"

[ambient]
enabled = true
strength = 1.0            # アンビエント強度倍率（0.0 で完全無効、1.0 で最大）
update_duration = 0.4     # goto_target に渡す duration（秒）。poll_interval に合わせること
# idle_breathing: 待機中の呼吸感ピッチ振動
breathing_amplitude = 2.5   # degree
breathing_period = 4.0      # 秒
# curiosity_glance: 数十秒に1回の小さなヨー振り
glance_interval_min = 30.0  # 秒
glance_interval_max = 60.0  # 秒
glance_amplitude = 5.0      # degree
glance_return_duration = 1.2  # グランス1往復の秒数
# running_sway: RUNNING 中の緩やかな pitch 揺れ（breathing より小さく遅い）
running_sway_amplitude = 1.5  # degree（breathing_amplitude より小さく）
running_sway_period = 6.0     # 秒（breathing_period より長く）
# thinking_tilt: RUNNING_BEHIND 時のわずかな首傾き
tilt_amplitude = 3.0          # degree
tilt_period = 8.0             # 秒
# afterglow / sag: スプリット直後の余韻
afterglow_duration = 3.0      # SPLIT_GOOD 後に続く秒数
sag_duration = 2.0            # SPLIT_BAD 後に続く秒数
# インパルスモーション後にアンビエントを止める秒数（余韻を残す）
post_impulse_pause = 0.8
